{% extends "base.html" %}
{% block title %}Edit User — {{ user.full_name }}{% endblock %}
{% block page_title %}Edit User{% endblock %}
{% block content %}
<div style="max-width:500px" class="pop-in">
  <div class="card">
    <div class="card-header"><div class="card-title">Edit {{ user.full_name }}</div></div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="full_name" class="form-control" value="{{ user.full_name }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select name="role" class="form-control">
            <option value="tenant"   {% if user.role=='tenant'   %}selected{% endif %}>Tenant</option>
            <option value="landlord" {% if user.role=='landlord' %}selected{% endif %}>Landlord</option>
            <option value="admin"    {% if user.role=='admin'    %}selected{% endif %}>Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Active</label>
          <select name="is_active" class="form-control">
            <option value="1" {% if user.is_active %}selected{% endif %}>Yes</option>
            <option value="0" {% if not user.is_active %}selected{% endif %}>No</option>
          </select>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary btn-full">Save Changes</button>
          <a href="{{ url_for('admin.view_user', user_id=user.id) }}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
