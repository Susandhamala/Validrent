{% extends "base.html" %}
{% block title %}Admin — Create User{% endblock %}
{% block page_title %}Create User{% endblock %}
{% block content %}
<div style="max-width:500px" class="pop-in">
  <div class="card">
    <div class="card-header"><div class="card-title">Create New User</div></div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input type="text" name="full_name" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email *</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" placeholder="+977 98XXXXXXXX">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select name="role" class="form-control">
            <option value="tenant">Tenant</option>
            <option value="landlord">Landlord</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Password *</label>
          <input type="text" name="password" class="form-control" required minlength="6">
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" name="gen_keys" value="1" checked>
            Generate RSA keys + X.509 certificate automatically
          </label>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary btn-full">Create User</button>
          <a href="{{ url_for('admin.users') }}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
