{% extends "base.html" %}
{% block title %}Edit Asset{% endblock %}
{% block page_title %}Edit Asset{% endblock %}
{% block content %}
<div style="max-width:520px" class="pop-in">
  <div class="card">
    <div class="card-header"><div class="card-title">Edit: {{ asset.asset_title }}</div></div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" name="asset_title" class="form-control" value="{{ asset.asset_title }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select name="category_id" class="form-control">
            {% for cat in categories %}
            <option value="{{ cat.id }}" {% if cat.id == asset.category_id %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" name="location" class="form-control" value="{{ asset.location or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Asset Identifier</label>
          <input type="text" name="asset_identifier" class="form-control" value="{{ asset.asset_identifier or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="3">{{ asset.description or '' }}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Estimated Value (NPR)</label>
          <input type="number" name="estimated_value" class="form-control" value="{{ asset.estimated_value or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select name="status" class="form-control">
            <option value="available" {% if asset.status=='available' %}selected{% endif %}>Available</option>
            <option value="rented"    {% if asset.status=='rented'    %}selected{% endif %}>Rented</option>
            <option value="inactive"  {% if asset.status=='inactive'  %}selected{% endif %}>Inactive</option>
          </select>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary btn-full">Save Changes</button>
          <a href="{{ url_for('admin.assets') }}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
