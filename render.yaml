services:
  - type: web
    name: validrent
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 2 run:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: validrent-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: BASE_URL
        value: https://validrent.susandhamala.com.np

databases:
  - name: validrent-db
    plan: free
